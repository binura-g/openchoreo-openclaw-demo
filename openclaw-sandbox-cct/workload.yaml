apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: openclaw-sandbox-agent
  namespace: default
spec:
  owner:
    projectName: openclaw-agents
    componentName: openclaw-sandbox-agent
  container:
    image: ghcr.io/openclaw/openclaw:slim
    command:
      - node
      - /app/dist/index.js
      - gateway
      - --bind=lan
      - --port
      - "18789"
      - --allow-unconfigured
      - --verbose
    env:
      - key: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: openai-api-key
            key: value
    files:
      - key: openclaw.json
        mountPath: /home/node/.openclaw/config/openclaw.json
        value: |
          {
            "gateway": {
              "mode": "local",
              "bind": "lan",
              "port": 18789,
              "controlUi": {
                "dangerouslyAllowHostHeaderOriginFallback": true
              }
            }
          }
  endpoints:
    gateway:
      displayName: OpenClaw Gateway
      type: HTTP
      port: 18789
      targetPort: 18789
      basePath: /
      visibility:
        - project
        - external
